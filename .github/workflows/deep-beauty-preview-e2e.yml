name: Deep Beauty Preview E2E

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  group: deep-beauty-preview-e2e-${{ github.event.deployment_status.sha }}
  cancel-in-progress: true

jobs:
  preview-e2e:
    name: Preview Public E2E
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Preview' &&
      github.event.deployment_status.target_url != ''
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment_status.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public Preview E2E
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.deployment_status.target_url }}
        run: npx playwright test --reporter=list

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-beauty-preview-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
