name: Deep Beauty Quality Gates

on:
  push:
    branches:
      - qa/deep-beauty
  pull_request:
    branches:
      - main
      - qa/deep-beauty
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-beauty-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run production build
        run: npm run build
