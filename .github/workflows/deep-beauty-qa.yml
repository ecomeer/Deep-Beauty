name: Deep Beauty QA

on:
  push:
    branches:
      - qa/deep-beauty
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Website URL to test (production or Vercel Preview)'
        required: false
        default: 'https://www.deepbeautykw.com'

permissions:
  contents: read

concurrency:
  group: deep-beauty-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-e2e:
    name: Quality Gates + Storefront E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://www.deepbeautykw.com' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install project dependencies
        run: npm ci

      - name: Install Playwright test runner
        run: npm install --no-save @playwright/test@latest

      - name: Run unit tests
        run: npm test

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit

      - name: Run production build
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run safe storefront tests
        run: npx playwright test

      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-beauty-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
