name: Sync test lockfile

on:
  push:
    branches:
      - claude/test-coverage-analysis-gvrcrc

permissions:
  contents: write

jobs:
  sync-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/test-coverage-analysis-gvrcrc
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Regenerate package lock
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit synchronized lockfile
        run: |
          if git diff --quiet -- package-lock.json; then
            echo "Lockfile already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          git commit -m "chore(test): synchronize package lock"
          git push origin HEAD:claude/test-coverage-analysis-gvrcrc
