name: Preview E2E

# Runs the Playwright smoke suite against each successful Vercel preview
# deployment. Kept separate from ci.yml so unit tests stay hermetic.
on:
  deployment_status:

jobs:
  smoke:
    # startsWith() is case-insensitive in GitHub Actions expressions, so this
    # catches 'Production', 'production', etc. regardless of how the
    # environment name is cased.
    if: >-
      github.event.deployment_status.state == 'success' &&
      !startsWith(github.event.deployment.environment, 'production')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | node -pe 'JSON.parse(require("fs").readFileSync(0)).dependencies["@playwright/test"].version')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      - run: npx playwright test
        env:
          E2E_BASE_URL: ${{ github.event.deployment_status.environment_url || github.event.deployment_status.target_url }}
          # Required while Vercel deployment protection is enabled on previews:
          # create the secret under Vercel → Project → Deployment Protection →
          # Protection Bypass for Automation, then add it to the repo secrets.
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
